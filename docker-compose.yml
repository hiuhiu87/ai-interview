x-backend-env: &backend-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_copilot
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: password

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interview_copilot
    ports:
      - "54333:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interview_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE_NAME: api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      CMS_BASE_URL: http://interview-cms-service:8081
      SESSION_BASE_URL: http://interview-session-service:8082
      WORKER_BASE_URL: http://ai-worker-service:8083
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      - interview-cms-service
      - interview-session-service
      - ai-worker-service

  interview-cms-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE_NAME: interview-cms-service
    ports:
      - "8084:8081"
    environment:
      <<: *backend-env
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy

  interview-session-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE_NAME: interview-session-service
    ports:
      - "8082:8082"
    environment:
      <<: *backend-env
      SERVER_PORT: 8082
      CMS_BASE_URL: http://interview-cms-service:8081
      WORKER_BASE_URL: http://ai-worker-service:8083
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-worker-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE_NAME: ai-worker-service
    ports:
      - "8083:8083"
    environment:
      <<: *backend-env
      SERVER_PORT: 8083
      SESSION_BASE_URL: http://interview-session-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - api-gateway

volumes:
  postgres_data:
