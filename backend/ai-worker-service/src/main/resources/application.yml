spring:
  application:
    name: ai-worker-service
  datasource:
    url: jdbc:postgresql://localhost:5432/interview_copilot
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: ${SERVER_PORT:8083}

app:
  service-name: ai-worker-service
  services:
    session:
      base-url: ${SESSION_BASE_URL:http://localhost:8082}
  messaging:
    rabbitmq:
      host: ${RABBITMQ_HOST:localhost}
      port: ${RABBITMQ_PORT:5672}
      username: ${RABBITMQ_USERNAME:guest}
      password: ${RABBITMQ_PASSWORD:guest}
