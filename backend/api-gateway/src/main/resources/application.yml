spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

server:
  port: ${SERVER_PORT:8089}

app:
  gateway:
    url:
      cms-service: ${CMS_BASE_URL:http://localhost:8081}
      session-service: ${SESSION_BASE_URL:http://localhost:8082}
      worker-service: ${WORKER_BASE_URL:http://localhost:8083}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
