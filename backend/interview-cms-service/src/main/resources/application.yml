spring:
  application:
    name: interview-cms-service
  datasource:
    url: jdbc:postgresql://localhost:5432/cms-db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret-key: '123321'

server:
  port: ${SERVER_PORT:8081}

app:
  service-name: interview-cms-service
