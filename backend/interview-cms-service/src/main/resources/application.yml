spring:
  application:
    name: interview-cms-service
  datasource:
    url: jdbc:postgresql://localhost:5432/cms-db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  #SECURITY CONFIGURATION
  security:
    oauth2:
      client:
        registration:
          google:
            client-name: google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret-key: ${SECRET_KEY}

frontend:
  url: http://localhost:3000

app:
  service-name: interview-cms-service
