spring:
  application:
    name: interview-cms-service
  datasource:
    url: jdbc:postgresql://localhost:54333/cms
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    openai:
      api-key: ${GROQ_API_KEY:gsk_xxx}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
    retry:
      max-attempts: 1
server:
  port: ${SERVER_PORT:8081}

app:
  service-name: interview-cms-service


